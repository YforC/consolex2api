services:
  consolex-gateway:
    build: .
    container_name: consolex-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8787}:${GATEWAY_PORT:-8787}"
    env_file:
      - ./.env
    environment:
      ACCOUNTS_DB: /app/data/accounts.sqlite3
    volumes:
      - ./data:/app/data

